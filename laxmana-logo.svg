<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0f"/>
  <!-- Abstract Infinity/Loop Design -->
  <path d="M100 40 
           C140 40, 160 70, 160 100 
           C160 130, 140 160, 100 160
           C60 160, 40 130, 40 100
           C40 70, 60 40, 100 40 Z" 
        fill="none" 
        stroke="url(#grad1)" 
        stroke-width="8"
        stroke-linecap="round"/>
  <!-- Inner loops -->
  <path d="M100 60
           C130 60, 140 80, 140 100
           C140 120, 130 140, 100 140
           C70 140, 60 120, 60 100
           C60 80, 70 60, 100 60 Z"
        fill="none"
        stroke="#e2e8f0"
        stroke-width="4"
        stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="15" fill="url(#grad1)"/>
  <!-- L Letter -->
  <text x="100" y="105" 
        font-family="system-ui, sans-serif" 
        font-size="20" 
        font-weight="bold" 
        fill="#0a0a0f" 
        text-anchor="middle">L</text>
</svg>